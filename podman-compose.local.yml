name: vinyl-keeper-local

services:
  app:
    image: vinyl-keeper:app
    network_mode: host
    env_file:
      - .env
      - .env.dev
    environment:
      TLS_CERT: /app/certs/dev.crt
      TLS_KEY: /app/certs/dev.key
    volumes:
      - ./data:/data
      - ./certs:/app/certs:ro
    depends_on:
      - image-service
    restart: unless-stopped

  image-service:
    image: vinyl-keeper:image-service
    network_mode: host
    command: ["uv", "run", "uvicorn", "image_service:app", "--host", "0.0.0.0", "--port", "8081"]
    env_file:
      - .env
      - .env.dev
    volumes:
      - ./models:/models:ro
    restart: unless-stopped
